<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小说书架</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #f5f0e8;
  --bg-card: #ffffff;
  --sidebar-bg: #faf8f5;
  --text: #2c2c2c;
  --text-secondary: #666;
  --accent: #e07a2f;
  --border: #e5e0d8;
  --shadow: rgba(0,0,0,0.08);
  --hover-shadow: rgba(0,0,0,0.15);
}
[data-theme="dark"] {
  --bg: #1a1a2e;
  --bg-card: #252540;
  --sidebar-bg: #16162a;
  --text: #e0e0e0;
  --text-secondary: #999;
  --accent: #f0923a;
  --border: #333355;
  --shadow: rgba(0,0,0,0.25);
  --hover-shadow: rgba(0,0,0,0.4);
}

/* ===== Reset & Base ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* ===== Utility ===== */
.hidden { display: none !important; }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ===== Bookshelf ===== */
#bookshelf { max-width: 960px; margin: 0 auto; padding: 0 20px 60px; }
.bs-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 32px;
}
.bs-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
.bs-theme-btn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.2s; background: var(--bg-card);
}
.bs-theme-btn:hover { transform: scale(1.1); border-color: var(--accent); }
.bs-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
.book-card {
  display: flex; background: var(--bg-card); border-radius: 12px;
  border: 1px solid var(--border); overflow: hidden; cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s;
}
.book-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px var(--hover-shadow); }
.book-cover {
  width: 140px; min-width: 140px; display: flex; align-items: center; justify-content: center;
  padding: 20px; font-size: 20px; font-weight: 700; color: #fff; text-align: center;
  line-height: 1.4; text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}
.book-info { padding: 20px; flex: 1; display: flex; flex-direction: column; }
.book-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.book-author { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
.book-desc {
  font-size: 14px; color: var(--text-secondary); line-height: 1.7;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 12px; flex: 1;
}
.book-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.book-genre {
  font-size: 12px; padding: 3px 10px; border-radius: 20px;
  background: var(--sidebar-bg); color: var(--accent); border: 1px solid var(--border);
}
.book-chapters { font-size: 12px; color: var(--text-secondary); }

/* ===== Reader View ===== */
#reader-view { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
#sidebar {
  width: 260px; min-width: 260px; background: var(--sidebar-bg);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  transition: transform 0.3s ease;
}
.sidebar-header { padding: 18px 16px 12px; border-bottom: 1px solid var(--border); }
.sidebar-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.sidebar-author { font-size: 12px; color: var(--text-secondary); }
#chapter-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.ch-item {
  padding: 10px 16px; cursor: pointer; font-size: 13px;
  border-left: 3px solid transparent; transition: all 0.15s;
  color: var(--text-secondary); line-height: 1.5;
}
.ch-item:hover { background: var(--bg); color: var(--text); }
.ch-item.active { background: rgba(224,122,47,0.1); border-left-color: var(--accent); color: var(--text); font-weight: 600; }
.ch-item .ch-num { font-size: 11px; color: var(--accent); display: block; margin-bottom: 2px; }

/* Main area */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Topbar */
#topbar {
  height: 50px; border-bottom: 1px solid var(--border); display: flex;
  align-items: center; padding: 0 16px; gap: 12px; background: var(--bg); flex-shrink: 0; position: relative;
}
#menu-btn { font-size: 20px; padding: 4px 8px; display: none; }
#back-btn { font-size: 18px; padding: 4px 8px; }
#book-name { font-size: 14px; font-weight: 700; flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-right { display: flex; gap: 6px; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  transition: all 0.15s; background: var(--bg-card);
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Progress bar */
#progress-bar {
  position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent);
  transition: width 0.3s ease;
}

/* Reader content */
#reader { flex: 1; overflow-y: auto; padding: 40px 20px; }
#reader-inner {
  max-width: 720px; margin: 0 auto; font-size: 17px; line-height: 1.9;
  letter-spacing: 0.02em; color: var(--text);
}
#reader-inner h1 {
  font-size: 28px; text-align: center; margin-bottom: 36px;
  padding-bottom: 16px; border-bottom: 1px solid var(--border); font-weight: 700;
}
#reader-inner h2 { font-size: 22px; margin: 1.5em 0 0.8em; font-weight: 700; }
#reader-inner h3 { font-size: 18px; margin: 1.2em 0 0.6em; font-weight: 700; }
#reader-inner p { margin-bottom: 1.2em; text-align: justify; }
#reader-inner blockquote {
  border-left: 3px solid var(--accent); padding-left: 16px; margin: 1.2em 0;
  color: var(--text-secondary); font-style: italic;
}
#reader-inner hr {
  border: none; border-top: 1px solid var(--border); margin: 2em auto;
  max-width: 120px; text-align: center; position: relative;
}
#reader-inner hr::after { content: '···'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--bg); padding: 0 8px; color: var(--text-secondary); letter-spacing: 4px; }
#reader-inner code { background: var(--sidebar-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
#reader-inner pre { background: var(--sidebar-bg); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 1em 0; }
#reader-inner pre code { background: none; padding: 0; }
#reader-inner ul, #reader-inner ol { margin: 1em 0; padding-left: 1.8em; }
#reader-inner li { margin-bottom: 0.4em; }
#reader-inner strong { font-weight: 700; }

/* Bottom nav */
#bottom-nav {
  height: 56px; border-top: 1px solid var(--border); display: flex;
  align-items: center; padding: 0 16px; gap: 12px; background: var(--bg); flex-shrink: 0;
}
#bottom-nav button {
  flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; transition: all 0.15s; background: var(--bg-card); color: var(--text);
}
#bottom-nav button:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
#bottom-nav button:disabled { opacity: 0.35; cursor: not-allowed; }
.nav-progress { font-size: 12px; color: var(--text-secondary); text-align: center; min-width: 60px; }

/* Mobile overlay for sidebar */
#sidebar-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 199; display: none;
}
#sidebar-overlay.show { display: block; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-track { background: transparent; }

/* ===== Responsive ===== */
@media (min-width: 640px) {
  .bs-grid { grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); }
}
@media (max-width: 768px) {
  #sidebar { position: fixed; left: 0; top: 0; height: 100%; z-index: 200; transform: translateX(-100%); border-right: none; }
  #sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px var(--shadow); }
  #menu-btn { display: flex; }
  #reader { padding: 24px 16px; }
  #reader-inner { font-size: 16px; }
  #reader-inner h1 { font-size: 24px; }
  .book-cover { width: 110px; min-width: 110px; font-size: 16px; }
}
@media (max-width: 480px) {
  .book-card { flex-direction: column; }
  .book-cover { width: 100%; height: 100px; }
  .bs-title { font-size: 18px; }
}
</style>
</head>
<body>

<!-- ========== BOOKSHELF VIEW ========== -->
<div id="bookshelf">
  <div class="bs-header">
    <div class="bs-title">小说书架</div>
    <button class="bs-theme-btn" id="bs-theme-btn" title="切换主题">☀️</button>
  </div>
  <div class="bs-grid" id="bs-grid">
    <div style="text-align:center;padding:60px 0;color:var(--text-secondary)">加载中...</div>
  </div>
</div>

<!-- ========== READER VIEW ========== -->
<div id="reader-view" class="hidden">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title" id="sb-title">--</div>
      <div class="sidebar-author" id="sb-author">--</div>
    </div>
    <div id="chapter-list"></div>
  </div>
  <div id="sidebar-overlay"></div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <button id="menu-btn" title="目录">☰</button>
      <button id="back-btn" title="返回书架">←</button>
      <div id="book-name">--</div>
      <div class="topbar-right">
        <button class="icon-btn" id="rd-theme-btn" title="切换主题">☀️</button>
      </div>
      <div id="progress-bar" style="width:0%"></div>
    </div>

    <div id="reader">
      <div id="reader-inner">
        <p style="text-align:center;color:var(--text-secondary);padding:40px 0">加载中...</p>
      </div>
    </div>

    <div id="bottom-nav">
      <button id="prev-ch">◀ 上一章</button>
      <span class="nav-progress" id="ch-progress">--</span>
      <button id="next-ch">下一章 ▶</button>
    </div>
  </div>
</div>

<script>
/* ===== App State ===== */
const App = {
  books: [],
  currentBook: null,
  chapters: [],
  currentChapter: 0,
  theme: localStorage.getItem('novel-theme') || 'light'
};

/* ===== DOM refs ===== */
const $ = id => document.getElementById(id);
const els = {
  bookshelf: $('bookshelf'), readerView: $('reader-view'),
  bsGrid: $('bs-grid'), bsThemeBtn: $('bs-theme-btn'),
  sidebar: $('sidebar'), sidebarOverlay: $('sidebar-overlay'),
  sbTitle: $('sb-title'), sbAuthor: $('sb-author'),
  chapterList: $('chapter-list'), bookName: $('book-name'),
  readerInner: $('reader-inner'), progressBar: $('progress-bar'),
  chProgress: $('ch-progress'), prevCh: $('prev-ch'), nextCh: $('next-ch'),
  menuBtn: $('menu-btn'), backBtn: $('back-btn'), rdThemeBtn: $('rd-theme-btn')
};

/* ===== Theme ===== */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const icon = t === 'dark' ? '🌙' : '☀️';
  els.bsThemeBtn.textContent = icon;
  els.rdThemeBtn.textContent = icon;
}
function toggleTheme() {
  App.theme = App.theme === 'light' ? 'dark' : 'light';
  applyTheme(App.theme);
  localStorage.setItem('novel-theme', App.theme);
}

/* ===== Local Storage ===== */
function saveProgress() {
  if (!App.currentBook) return;
  localStorage.setItem('novel-progress', JSON.stringify({
    bookId: App.currentBook.id,
    chapter: App.currentChapter
  }));
}
function loadProgress() {
  try {
    const data = JSON.parse(localStorage.getItem('novel-progress'));
    return data || null;
  } catch { return null; }
}

/* ===== Data Loading ===== */
async function loadBooks() {
  try {
    const res = await fetch('data/books.json');
    if (!res.ok) throw new Error('fetch failed');
    App.books = await res.json();
    renderBookshelf();
  } catch (e) {
    const isFile = location.protocol === 'file:';
    els.bsGrid.innerHTML = '<div style="text-align:center;padding:60px 0;color:var(--text-secondary)">' +
      (isFile ? '无法通过 file:// 协议加载本地 JSON 数据。<br><small>请启动一个本地 HTTP 服务器后访问，例如：<br><code style="background:var(--sidebar-bg);padding:2px 6px;border-radius:4px">npx serve .</code> 或 <code style="background:var(--sidebar-bg);padding:2px 6px;border-radius:4px">python -m http.server</code></small>'
        : '无法加载书籍列表，请检查 data/books.json 是否存在。') +
      '</div>';
    console.error(e);
  }
}

async function loadBookChapters(id) {
  try {
    const res = await fetch(`data/${id}.json`);
    if (!res.ok) throw new Error('fetch failed');
    App.chapters = await res.json();
    App.currentChapter = 0;
  } catch (e) {
    App.chapters = [{title: '加载失败', content: '# 加载失败\n\n无法加载章节数据，请检查 `data/' + id + '.json` 是否存在。'}];
    console.error(e);
  }
}

/* ===== Bookshelf Render ===== */
function renderBookshelf() {
  if (!App.books.length) return;
  const progress = loadProgress();
  els.bsGrid.innerHTML = App.books.map(b => {
    const hasProgress = progress && progress.bookId === b.id;
    return `
    <div class="book-card fade-in" data-id="${b.id}">
      <div class="book-cover" style="background:${b.color}">${b.title}</div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        <div class="book-desc">${b.description}</div>
        <div class="book-meta">
          <span class="book-genre">${b.genre}</span>
          <span class="book-chapters">${b.chapters} 章</span>
          ${hasProgress ? `<span class="book-genre" style="background:var(--accent);color:#fff;border-color:var(--accent)">继续阅读</span>` : ''}
        </div>
      </div>
    </div>
  `}).join('');

  els.bsGrid.querySelectorAll('.book-card').forEach(card => {
    card.addEventListener('click', () => openBook(card.dataset.id));
  });
}

/* ===== Reader Logic ===== */
async function openBook(id) {
  const book = App.books.find(b => b.id === id);
  if (!book) return;
  App.currentBook = book;

  // Try restore progress
  const progress = loadProgress();
  await loadBookChapters(id);
  if (progress && progress.bookId === id && progress.chapter < App.chapters.length) {
    App.currentChapter = progress.chapter;
  }

  // UI switch
  els.bookshelf.classList.add('hidden');
  els.readerView.classList.remove('hidden');
  els.readerView.classList.add('fade-in');

  // Update sidebar header
  els.sbTitle.textContent = book.title;
  els.sbAuthor.textContent = book.author;
  els.bookName.textContent = book.title;

  renderSidebar();
  renderChapter();
  saveProgress();
}

function backToShelf() {
  els.readerView.classList.add('hidden');
  els.readerView.classList.remove('fade-in');
  els.bookshelf.classList.remove('hidden');
  els.bookshelf.classList.add('fade-in');
  App.currentBook = null;
  App.chapters = [];
  App.currentChapter = 0;
  closeSidebar();
}

function renderSidebar() {
  els.chapterList.innerHTML = App.chapters.map((ch, i) => `
    <div class="ch-item ${i === App.currentChapter ? 'active' : ''}" data-idx="${i}">
      <span class="ch-num">第 ${i + 1} 章</span>
      ${ch.title.replace(/^第.*?章[\s_]*/, '')}
    </div>
  `).join('');

  els.chapterList.querySelectorAll('.ch-item').forEach(el => {
    el.addEventListener('click', () => goToChapter(parseInt(el.dataset.idx)));
  });

  // Scroll active into view
  const active = els.chapterList.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function renderChapter() {
  const ch = App.chapters[App.currentChapter];
  if (!ch) return;

  // Use marked.js to render markdown
  els.readerInner.innerHTML = marked.parse(ch.content);
  els.bookName.textContent = `${App.currentBook.title} · ${ch.title}`;

  // Progress
  const pct = ((App.currentChapter + 1) / App.chapters.length * 100).toFixed(1);
  els.progressBar.style.width = pct + '%';
  els.chProgress.textContent = `${App.currentChapter + 1}/${App.chapters.length}`;

  // Buttons
  els.prevCh.disabled = App.currentChapter === 0;
  els.nextCh.disabled = App.currentChapter === App.chapters.length - 1;

  // Scroll top
  $('reader').scrollTop = 0;

  // Update sidebar active
  els.chapterList.querySelectorAll('.ch-item').forEach((el, i) => {
    el.classList.toggle('active', i === App.currentChapter);
  });
  const active = els.chapterList.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function goToChapter(idx) {
  if (idx < 0 || idx >= App.chapters.length) return;
  App.currentChapter = idx;
  renderChapter();
  saveProgress();
  if (window.innerWidth <= 768) closeSidebar();
}

function prevChapter() { goToChapter(App.currentChapter - 1); }
function nextChapter() { goToChapter(App.currentChapter + 1); }

/* ===== Sidebar Mobile ===== */
function openSidebar() {
  els.sidebar.classList.add('open');
  els.sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  els.sidebar.classList.remove('open');
  els.sidebarOverlay.classList.remove('show');
}
function toggleSidebar() {
  els.sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
}

/* ===== Event Listeners ===== */
els.bsThemeBtn.addEventListener('click', toggleTheme);
els.rdThemeBtn.addEventListener('click', toggleTheme);
els.backBtn.addEventListener('click', backToShelf);
els.menuBtn.addEventListener('click', toggleSidebar);
els.sidebarOverlay.addEventListener('click', closeSidebar);
els.prevCh.addEventListener('click', prevChapter);
els.nextCh.addEventListener('click', nextChapter);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (els.readerView.classList.contains('hidden')) return;
  if (e.key === 'ArrowLeft') prevChapter();
  if (e.key === 'ArrowRight') nextChapter();
  if (e.key === 'Escape') closeSidebar();
});

// Restore theme
applyTheme(App.theme);

// Init
loadBooks();

// If progress exists, maybe auto-open? No, user should choose from shelf.
// But we can show a hint on the bookshelf if there's saved progress.
</script>
</body>
</html>
